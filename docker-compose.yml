version: '3.8'

services:
    app:
        build: .
        ports:
            - "10000:10000"
        environment:
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: crm_db
            DB_USERNAME: root
            DB_PASSWORD: secret
            APP_KEY: base64:qlI8oQnheT2/lLLQ1G0wjphpsFD7hN9Lk3rNzM5BQ9o=
            APP_ENV: local
            APP_DEBUG: true
            SESSION_DRIVER: cookie
            SESSION_DOMAIN: localhost
            SANCTUM_STATEFUL_DOMAINS: localhost,localhost:10000,127.0.0.1,127.0.0.1:10000
            APP_URL: http://localhost:10000
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./storage:/var/www/html/storage
            - .:/var/www/html
            - /var/www/html/public/build
            - /var/www/html/vendor

    db:
        image: mysql:8
        environment:
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_DATABASE: crm_db
        ports:
            - "3307:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            retries: 10

volumes:
    mysql_data:
